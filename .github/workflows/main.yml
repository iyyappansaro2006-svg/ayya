name: Secure Workflow Example

on:
  push:
    branches:
      - main

jobs:
  secure-job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use secrets as environment variables
        env:
          API_KEY: ${{ secrets.API_KEY }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          echo "Running secure operations..."
          # Example usage (DO NOT echo secrets)
          curl -H "Authorization: Bearer $API_KEY" https://api.example.com/data

      - name: Use secrets directly in a command
        run: |
          curl -u "user:${{ secrets.DB_PASSWORD }}" https://example.com/login

      - name: Mask sensitive output (extra safety)
        run: |
          echo "::add-mask::${{ secrets.API_KEY }}"
          echo "Secret is masked if accidentally printed"
